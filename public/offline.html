<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - PAManager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .offline-icon {
            width: 80px;
            height: 80px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .offline-icon svg {
            width: 40px;
            height: 40px;
            color: #718096;
        }

        h1 {
            color: #1a365d;
            font-size: 24px;
            margin-bottom: 16px;
        }

        p {
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .btn {
            display: inline-block;
            background: #1a365d;
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2c5282;
        }

        .tips {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            text-align: left;
        }

        .tips h3 {
            color: #2d3748;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .tips ul {
            color: #718096;
            font-size: 14px;
            padding-left: 20px;
        }

        .tips li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M23.64 7c-.45-.34-4.93-4-11.64-4-1.5 0-2.89.19-4.15.48L18.18 13.8 23.64 7zm-6.6 8.22L3.27 1.44 2 2.72l2.05 2.06C1.91 5.76.59 6.82.36 7l11.63 14.49.01.01.01-.01 3.9-4.86 3.32 3.32 1.27-1.27-3.46-3.46z"/>
            </svg>
        </div>

        <h1>Sei offline</h1>
        <p>Non sei connesso a Internet. Verifica la tua connessione e riprova.</p>

        <button class="btn" onclick="location.reload()">Riprova</button>

        <div class="tips">
            <h3>Suggerimenti:</h3>
            <ul>
                <li>Verifica che il Wi-Fi o i dati mobili siano attivi</li>
                <li>Prova a spostarti in un'area con segnale migliore</li>
                <li>Se il problema persiste, contatta il supporto tecnico</li>
            </ul>
        </div>
    </div>

    <script>
        // Ricarica automaticamente quando torna online
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
</body>
</html>
