; PAManager - PHP overrides per container

; Error handling: in produzione tutto su stderr (catturato da Docker logs)
display_errors = Off
log_errors = On
error_log = /proc/self/fd/2
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Upload e POST (certificati medici fino a 5MB, ma utile margine per upload uploads.zip durante migrazione)
upload_max_filesize = 64M
post_max_size = 80M
memory_limit = 256M
max_execution_time = 60
max_input_vars = 3000

; Sessioni (sicurezza)
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1
session.use_only_cookies = 1
session.gc_maxlifetime = 7200

; Timezone Italia
date.timezone = Europe/Rome

; Opcache (performance)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.validate_timestamps = 1
opcache.fast_shutdown = 1

; Realpath cache (performance file access)
realpath_cache_size = 4096K
realpath_cache_ttl = 600
