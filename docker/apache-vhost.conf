<VirtualHost *:80>
    ServerName _
    DocumentRoot /var/www/html/public

    # Necessario per .htaccess esistenti (mod_rewrite per routing)
    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Sicurezza: blocca accesso diretto a directory sensibili
    <DirectoryMatch "/var/www/html/(config|database|src|storage|logs|vendor)">
        Require all denied
    </DirectoryMatch>

    # Log su stdout/stderr (Docker best practice)
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
    LogLevel warn

    # Sicurezza headers base (l'app aggiunge i suoi via PHP)
    ServerSignature Off
</VirtualHost>

# ServerTokens deve stare a livello globale, non dentro <VirtualHost>
ServerTokens Prod
